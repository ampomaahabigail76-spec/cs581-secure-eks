apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-reader
  namespace: fintech-app
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-reader-binding
  namespace: fintech-app
subjects:
- kind: ServiceAccount
  name: default
  namespace: fintech-app
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: app-reader
